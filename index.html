        extend: {

              DEFAULT: '#002838', // Cor Principal Escura

    function updateDmsTagConversion() {
      const dmsInput = document.getElementById('dms-val-input');
      const tagInput = document.getElementById('tag-val-input');
      const resultEl = document.getElementById('dms-conversion-result');

      if (!dmsInput || !tagInput || !resultEl) return;

      state.dmsInput = dmsInput.value;
      state.tagInput = tagInput.value;

      let tag = state.tagInput.replace(/^#/, ''); 
      let parts = tag.split('-');
      
      if (parts.length > 1) {
        parts[parts.length - 1] = state.dmsInput; 
        tag = parts.join('-');
      } else {
        tag = tag + '-' + state.dmsInput;
      }
      
      resultEl.textContent = tag;

    function initApp() {
      if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        state.darkMode = true;
        toggleDarkMode(true);
      } else {
        toggleDarkMode(false);
      }
      translateUI();
      switchTab('cq');
    }

    function toggleDarkMode(force) {
      if (force === undefined) {
        state.darkMode = !state.darkMode;
      } else {
        state.darkMode = force;
      }
      const htmlEl = document.documentElement;
      const themeBtn = document.getElementById('theme-toggle-btn');
      
      if (state.darkMode) {
        htmlEl.classList.add('dark');
        themeBtn.innerHTML = Icons.Sun;
        themeBtn.className = "p-2 rounded-lg border border-brand-light bg-brand-darker text-amber-400 hover:bg-brand transition-all";
      } else {
        htmlEl.classList.remove('dark');
        themeBtn.innerHTML = Icons.Moon;
        themeBtn.className = "p-2 rounded-lg border border-zinc-200 bg-slate-50 text-zinc-500 hover:bg-zinc-200 transition-all";
      }
      renderActiveTab();
    }

    function switchTab(tabId) {
      state.activeTab = tabId;
      
      ['cq', 'hvac', 'bandejas'].forEach(tab => {
        const btn = document.getElementById(`tab-${tab}-btn`);
        const btnMob = document.getElementById(`tab-${tab}-btn-mob`);
        
        if (tab === tabId) {
          if (btn) btn.className = "px-4 py-1.5 rounded-md text-xs font-bold transition-all flex items-center gap-2 bg-white dark:bg-brand text-brand dark:text-white shadow";
          if (btnMob) btnMob.className = "px-4 py-2 rounded-md text-xs font-bold transition-all flex items-center gap-2 bg-brand dark:bg-brand-accent text-white shadow";
        } else {
          if (btn) btn.className = "px-4 py-1.5 rounded-md text-xs font-bold transition-all flex items-center gap-2 text-zinc-500 dark:text-zinc-400 hover:text-zinc-800 dark:hover:text-zinc-200";
          if (btnMob) btnMob.className = "px-4 py-2 rounded-md text-xs font-bold transition-all flex items-center gap-2 bg-slate-100 dark:bg-brand-darker text-zinc-500 dark:text-zinc-400";
        }
      });

      renderActiveTab();
    }

    function renderActiveTab() {
      if (state.activeTab === 'cq') {
        renderChecklist();
      } else if (state.activeTab === 'hvac') {
        renderHVAC();
      } else if (state.activeTab === 'bandejas') {
        renderTrays();
      }
    }

    function changeLanguage(lang) {
      state.lang = lang;
      translateUI();
    }

    function translateUI() {
      const t = DICTIONARY[state.lang] || DICTIONARY['pt'];
      document.getElementById('header-title').textContent = t.appTitle;
      document.getElementById('header-subtitle').textContent = t.appSubtitle;
      document.getElementById('tab-cq-label').textContent = t.tabCq;
      document.getElementById('tab-hvac-label').textContent = t.tabHvac;
      document.getElementById('tab-bandejas-label').textContent = t.tabBandejas;

      document.getElementById('tab-cq-btn-mob').textContent = t.tabCq.split(' ')[0];
      document.getElementById('tab-hvac-btn-mob').textContent = t.tabHvac.split(' ')[0];
      document.getElementById('tab-bandejas-btn-mob').textContent = t.tabBandejas.split(' ')[0];

      document.getElementById('modal-iso-title').textContent = t.guideIso;
      document.getElementById('modal-cortes-title').textContent = t.guideCortes;
      document.getElementById('modal-boxes-title').textContent = t.boxes;

      renderModalContents();
      renderActiveTab();
    }

    function copyTextToClipboard(text, elementId) {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);

      const btn = document.getElementById(elementId);
      const originalText = btn.innerHTML;
      btn.innerHTML = `${Icons.Check} ${DICTIONARY[state.lang].copied}`;
      setTimeout(() => {
        btn.innerHTML = originalText;
      }, 1500);
    }

    function openModal(modalId) {
      const modal = document.getElementById(modalId);
      modal.classList.remove('hidden');
      modal.classList.add('flex');
      if (modalId === 'modal-boxes') {
        renderEarthingBoxesTable();
      }
    }

    function closeModal(modalId) {
      const modal = document.getElementById(modalId);
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    function toggleChecklist(itemId, action = 'checked') {
      if (state.checkedItems[itemId] === action) {
        delete state.checkedItems[itemId];
      } else {
        state.checkedItems[itemId] = action;
      }
      renderChecklist();
    }

    function clearChecklist() {
      state.checkedItems = {};
      renderChecklist();
    }

    function renderChecklist() {
      const t = DICTIONARY[state.lang] || DICTIONARY['pt'];
      let totalItems = 0;
      let checkedCount = 0;

      CHECKLIST_DATA.forEach(cat => {
        cat.items.forEach(item => {
          totalItems++;
          if (state.checkedItems[item.id]) checkedCount++; 
        });
      });
      const progress = totalItems === 0 ? 0 : Math.round((checkedCount / totalItems) * 100);

      const renderCategoriesBlock = (categories) => {
        return categories.map(cat => {
          const catTitle = cat.category[state.lang] || cat.category.pt;
          return `
            <div class="bg-white dark:bg-brand p-5 rounded-xl border border-zinc-200 dark:border-brand-light shadow-sm print-break-inside-avoid">
              <h3 class="text-sm font-black text-zinc-800 dark:text-white mb-4 flex items-center gap-2 border-b border-zinc-100 dark:border-brand-darker pb-2">
                <span class="w-2 h-2 rounded-full bg-brand dark:bg-brand-accent"></span>
                ${catTitle}
              </h3>
              <div class="space-y-3">
                ${cat.items.map(item => {
                  const status = state.checkedItems[item.id];
                  const isChecked = status === 'checked';
                  const isNa = status === 'na';

                  return `

                      <div class="mt-0.5 w-5 h-5 rounded border flex items-center justify-center shrink-0 transition-colors ${isChecked ? 'bg-brand dark:bg-brand-accent border-brand text-white' : (isNa ? 'bg-zinc-400 border-zinc-400 text-white dark:bg-zinc-600 dark:border-zinc-600' : 'border-zinc-300 dark:border-brand-light bg-transparent')}">
                        ${isChecked ? Icons.Check : (isNa ? Icons.Minus : '')}
                      </div>
                      <div class="flex-1 flex flex-col sm:flex-row sm:items-start justify-between gap-2">
                        <span class="text-xs font-semibold leading-relaxed flex-1 mt-0.5 ${isDone ? 'text-zinc-500 dark:text-zinc-400 line-through opacity-70' : 'text-zinc-700 dark:text-zinc-200'}">
                          ${item.text}
                        </span>
                        <div class="flex flex-wrap gap-2 shrink-0 mt-2 sm:mt-0 items-center">
                          <button onclick="event.stopPropagation(); toggleChecklist('${item.id}', 'na')" class="px-2 py-0.5 rounded text-[10px] font-bold border transition-colors ${isNa ? 'bg-zinc-600 text-white border-zinc-700 dark:bg-zinc-300 dark:text-zinc-900' : 'bg-zinc-100 text-zinc-500 border-zinc-200 hover:bg-zinc-200 dark:bg-brand-darker dark:text-zinc-400 dark:border-brand-light dark:hover:bg-brand-light/30'}">
                            N/A
                          </button>
                          ${item.tag ? `
                            <span class="px-2 py-0.5 rounded text-[10px] font-medium print-border print-text-black ${isDone ? 'bg-zinc-100 text-zinc-400 dark:bg-brand-darker dark:text-zinc-500' : 'bg-zinc-100 text-zinc-600 dark:bg-brand-darker dark:text-zinc-300'}">
                              ${item.tag}
                            </span>
                          ` : ''}
                          ${item.tagImportant ? `
                            <span class="px-2 py-0.5 rounded text-[10px] font-bold print-border print-text-black ${isDone ? 'bg-zinc-100 text-zinc-400 dark:bg-brand-darker dark:text-zinc-500' : 'bg-amber-100 text-amber-700 dark:bg-rose-950/60 dark:text-rose-300'}">
                              ${item.tagImportant}
                            </span>
                          ` : ''}
                        </div>
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          `;
        }).join('');
      };

      const internalCats = CHECKLIST_DATA.filter(c => c.type === 'internal');
      const isoCats = CHECKLIST_DATA.filter(c => c.type === 'iso');

      let html = `
        <div class="space-y-6 animate-fadeIn">
          <div class="flex flex-col md:flex-row gap-4 justify-between items-center bg-white dark:bg-brand p-4 rounded-xl border border-zinc-200 dark:border-brand-light shadow-sm">
            <div class="flex items-center gap-3 w-full md:w-auto">
              <input 
                type="text" 
                id="sheetNameInput"
                value="${state.sheetName}" 
                oninput="state.sheetName = this.value" 
                placeholder="${t.sheetName}"
                class="bg-slate-100 dark:bg-brand-darker border border-zinc-200 dark:border-brand-light px-3 py-2 rounded-lg text-sm font-bold w-full md:w-64 outline-none focus:border-brand-accent dark:focus:border-brand-accent transition-colors text-zinc-900 dark:text-zinc-100"
              />
            </div>
            <div class="flex flex-wrap gap-2 justify-end w-full md:w-auto">
              <button onclick="openModal('modal-iso')" class="px-3 py-1.5 rounded-lg border border-brand-accent text-brand-accent dark:text-brand-light font-bold text-xs hover:bg-brand-accent hover:text-white dark:hover:text-white transition-colors flex items-center gap-1">
                ${Icons.Book} ${t.guideIso}
              </button>
              <button onclick="openModal('modal-cortes')" class="px-3 py-1.5 rounded-lg border border-brand-accent text-brand-accent dark:text-brand-light font-bold text-xs hover:bg-brand-accent hover:text-white dark:hover:text-white transition-colors flex items-center gap-1">
                ${Icons.Layers} ${t.guideCortes}
              </button>
              <div class="w-px h-6 bg-zinc-300 dark:bg-brand-light mx-1 self-center"></div>
              <button onclick="clearChecklist()" class="px-3 py-1.5 rounded-lg bg-rose-50 text-rose-600 border border-rose-200 dark:bg-rose-950/40 dark:border-rose-900/50 dark:text-rose-400 font-bold text-xs hover:opacity-80 transition-colors flex items-center gap-1">
                ${Icons.Trash} ${t.clear}
              </button>
              <button onclick="window.print()" class="px-3 py-1.5 rounded-lg bg-zinc-100 text-zinc-700 border border-zinc-300 dark:bg-brand-light dark:border-brand-accent dark:text-zinc-100 font-bold text-xs hover:opacity-80 transition-colors flex items-center gap-1">
                ${Icons.Printer} ${t.print}
              </button>

            <div class="flex justify-between items-center mb-2">
              <span class="text-xs font-black uppercase tracking-wider text-zinc-500 dark:text-zinc-400">Progresso Geral</span>
              <span class="text-sm font-black text-brand dark:text-brand-accent">${progress}%</span>
            </div>
            <div class="w-full bg-slate-200 dark:bg-brand-darker h-2 rounded-full overflow-hidden">
              <div class="bg-brand dark:bg-brand-accent h-full transition-all duration-300 ease-out" style="width: ${progress}%"></div>
            </div>
          </div>

          <div class="mt-8 mb-2 flex items-center gap-3">
             <div class="w-2 h-6 bg-brand dark:bg-brand-accent rounded-sm"></div>
             <h2 class="text-base font-black uppercase tracking-widest text-brand dark:text-white">Checklist Interno do Projeto</h2>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            ${renderCategoriesBlock(internalCats)}

             <h2 class="text-base font-black uppercase tracking-widest text-brand dark:text-white">Normas de Qualidade (ISO)</h2>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pb-10">
            ${renderCategoriesBlock(isoCats)}
          </div>
        </div>
      `;
      document.getElementById('main-container').innerHTML = html;
      updateDmsTagConversion();
    }

    function getMaterialStyle(mat, isSelected) {
      if (!isSelected) {
        return state.darkMode 
          ? "bg-zinc-900 border-zinc-800 text-zinc-400 hover:bg-brand-darker hover:border-brand-accent/50" 
          : "bg-white border-zinc-200 text-zinc-600 hover:bg-zinc-50 hover:border-zinc-300";
      }
      
      switch (mat) {
        case 'Aço Carbono':
          return state.darkMode ? "bg-zinc-800 border-zinc-500 text-zinc-100 font-bold shadow-md" : "bg-zinc-200 border-zinc-400 text-zinc-800 font-bold shadow-sm";
        case 'Aço Inoxidável':
          return state.darkMode ? "bg-purple-950/60 border-purple-600 text-purple-200 font-bold shadow-md" : "bg-purple-100 border-purple-300 text-purple-800 font-bold shadow-sm";
        case 'Aço Galvanizado':
          return state.darkMode ? "bg-emerald-950/50 border-emerald-700 text-emerald-200 font-bold shadow-md" : "bg-emerald-50 border-emerald-300 text-emerald-800 font-bold shadow-sm";
        case 'Cobre':
          return state.darkMode ? "bg-amber-950/50 border-amber-700 text-amber-200 font-bold shadow-md" : "bg-amber-50 border-amber-300 text-amber-800 font-bold shadow-sm";
        case 'Equipamento':
          return state.darkMode ? "bg-indigo-950/60 border-indigo-600 text-indigo-200 font-bold shadow-md" : "bg-indigo-100 border-indigo-300 text-indigo-800 font-bold shadow-sm";
        default:
          return "bg-brand border-brand-accent text-white font-bold";
      }
    }

    function selectHvacScope(scope) {
      state.hvacScope = scope;
      if (scope === 'piping') {
        state.hvacGeom = 'Circular';
        if (state.hvacMaterial === 'Equipamento') {
          state.hvacMaterial = 'Aço Carbono';
        }
      }
      renderHVAC();
    }

    function selectHvacMaterial(material) {
      state.hvacMaterial = material;
      renderHVAC();
    }

    function selectHvacGeom(geom) {
      if (state.hvacMaterial === 'Equipamento') return;
      state.hvacGeom = geom;
      renderHVAC();
    }

    function selectHvacIso(iso) {
      if (state.hvacMaterial === 'Equipamento') return;
      state.hvacIso = iso;
      renderHVAC();
    }

    function selectHvacConn(conn) {
      if (state.hvacMaterial === 'Equipamento') return;
      state.hvacConn = conn;
      renderHVAC();
    }

    function renderHVAC() {
      const t = DICTIONARY[state.lang] || DICTIONARY['pt'];
      const list = DB_HVAC[state.hvacScope] || [];
      const isEquipment = state.hvacMaterial === 'Equipamento';
      
      const matched = isEquipment 
        ? list.find(i => i.material === 'Equipamento') 
        : list.find(i => i.material === state.hvacMaterial && i.geometry === state.hvacGeom && i.insulated === state.hvacIso);
      
      const finalTypical = matched ? (isEquipment ? 'E53D' : (state.hvacConn === 'jumper' ? matched.typicalJumper : matched.typicalGround)) : t.noTypical;

      const strokeColor = state.darkMode ? '#e4e4e7' : '#18181b';
      const strokeBg = state.darkMode ? '#00161f' : '#f4f4f5';
      const borderBg = state.darkMode ? '#003e57' : '#e4e4e7';
      const textColor = state.darkMode ? '#f4f4f5' : '#18181b';
      const secondaryText = state.darkMode ? '#94a3b8' : '#71717a';

      const materials = ['Aço Carbono', 'Aço Inoxidável', 'Aço Galvanizado'];
      if (state.hvacScope === 'piping') {
        materials.push('Cobre');
      } else {
        materials.push('Equipamento');
      }

      let svgHTML = '';
      if (finalTypical !== t.noTypical) {
        const code = finalTypical.toUpperCase();
        if (code.includes('E53D')) {
          svgHTML = `
            <svg viewBox="0 0 400 220" class="w-full h-auto rounded-xl border bg-slate-50 border-zinc-200 dark:bg-brand-darker dark:border-brand-light p-4">

              <rect x="70" y="70" width="160" height="100" fill="${strokeBg}" stroke="${strokeColor}" stroke-width="3" rx="2" />
              <text x="80" y="120" fill="${secondaryText}" font-size="10" font-weight="500">${t.svgE53DFrame}</text>
              <circle cx="180" cy="120" r="12" fill="${state.darkMode ? '#003e57' : '#d4d4d8'}" />
              <path d="M 180 120 C 230 120, 260 170, 330 170" stroke="#10b981" stroke-width="6" stroke-linecap="round" fill="none" />
              <rect x="171" y="114" width="18" height="12" fill="#d97706" rx="1" />
              <text x="245" y="105" fill="${textColor}" font-size="11" font-weight="600">${t.svgE53DStud}</text>
              <text x="245" y="120" fill="#10b981" font-size="10" font-weight="600">${t.svgEarthCable}</text>
              <text x="20" y="200" fill="#ef4444" font-size="9" font-weight="500" class="animate-pulse">${t.svgE53DWarning}</text>
            </svg>
          `;
        } else if (code.includes('E51A') || code.includes('E53A')) {
          svgHTML = `
            <svg viewBox="0 0 400 220" class="w-full h-auto rounded-xl border bg-slate-50 border-zinc-200 dark:bg-brand-darker dark:border-brand-light p-4">
              <text x="20" y="25" fill="${secondaryText}" font-size="11" font-weight="600">${t.svgFlangeTitle}</text>
              <path d="M 60 170 L 190 170 L 190 60" stroke="${strokeColor}" stroke-width="4" fill="none" />

        content = `<circle cx="40" cy="20" r="10" stroke-width="2" /><circle cx="40" cy="20" r="4" stroke-width="2" />`;

                <p class="text-[11px] text-zinc-500 leading-relaxed uppercase">
                  Elements metálicos maciços cortados longitudinalmente <span class="text-rose-600 dark:text-rose-400 font-bold">NÃO SOFREM HACHURA</span>. Isso inclui: eixos, pinos de terra, chavetas, parafusos, rebites, arruelas, dentes de engrenagem, porcas e nervuras estruturais de reforço. Hachurá-los induz ao erro de considerá-los vazados/ocos.
                </p>
              </div>

            </div>
          </section>

          <!-- SEÇÃO 4: ESCALAS E IDENTIFICAÇÃO -->
          <section class="space-y-3">
            <h3 class="text-sm font-black text-brand dark:text-brand-accent uppercase tracking-wider flex items-center gap-1.5 border-b border-zinc-200 dark:border-brand-light pb-1">
              <span class="w-1.5 h-3 bg-brand dark:bg-brand-accent rounded-sm"></span>
              4. Textos, Legibilidade e Padronização de Escalas (ISO 129-1 / ISO 3098)
            </h3>
            <div class="overflow-x-auto rounded-xl border border-zinc-200 dark:border-brand-light shadow-sm">
              <table class="w-full text-left border-collapse text-xs">
                <thead class="bg-slate-100 dark:bg-brand-darker font-bold">
                  <tr>
                    <th class="p-2.5 border-b border-zinc-200 dark:border-brand-light">Item do Desenho</th>
                    <th class="p-2.5 border-b border-zinc-200 dark:border-brand-light">Regra de Grafia / Tamanho</th>
                    <th class="p-2.5 border-b border-zinc-200 dark:border-brand-light">Exemplo Recomendado</th>
                  </tr>
                </thead>
                <tbody>
                  <tr class="border-b border-zinc-100 dark:border-brand-light/30">
                    <td class="p-2.5 font-bold">Identificação do Corte</td>
                    <td class="p-2.5">Textos em caixa alta, tamanho mínimo <span class="font-bold">5.0mm</span>, em Arial Narrow ou ISO CT, centralizado logo abaixo do corte correspondente.</td>
                    <td class="p-2.5 font-mono text-brand-accent dark:text-brand-light font-bold">CORTE A-A</td>
                  </tr>
                  <tr class="border-b border-zinc-100 dark:border-brand-light/30">
                    <td class="p-2.5 font-bold">Escala Local do Detalhe</td>
                    <td class="p-2.5">Se o corte diferir da escala principal declarada na legenda/carimbo geral, deve-se explicitar a escala local em tamanho <span class="font-bold">3.5mm</span>.</td>
                    <td class="p-2.5 font-mono text-brand-accent dark:text-brand-light font-bold">ESCALA 1:5</td>
                  </tr>
                  <tr>
                    <td class="p-2.5 font-bold">Sufixos e Referências Cruzadas</td>
                    <td class="p-2.5">Para cortes que aparecem em outras folhas do book de desenhos, referenciar as coordenadas da folha de origem e destino na linha de chamada.</td>
                    <td class="p-2.5 font-mono text-brand-accent dark:text-brand-light font-bold">VER FOLHA 02</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>

        </div>
      `;
    }

    window.addEventListener('DOMContentLoaded', initApp);
